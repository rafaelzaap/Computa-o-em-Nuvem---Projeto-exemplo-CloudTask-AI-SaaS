apiVersion: v1
kind: Secret
metadata:
  name: cloudtask-secrets
  namespace: cloudtask
type: Opaque
stringData:
  # Valores exclusivamente didáticos para o cluster local.
  # Em cloud, crie o Secret fora do Git ou use AWS Secrets Manager.
  POSTGRES_PASSWORD: local-dev-only
  SECRET_KEY: local-dev-only-change-me
  DATABASE_URL: postgresql+psycopg2://cloudtask:local-dev-only@cloudtask-db:5432/cloudtask
