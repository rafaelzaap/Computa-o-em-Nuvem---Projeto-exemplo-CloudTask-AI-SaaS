apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudtask-db
  namespace: cloudtask
  labels:
    app: cloudtask-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudtask-db
  template:
    metadata:
      labels:
        app: cloudtask-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: cloudtask
            - name: POSTGRES_DB
              value: cloudtask
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "cloudtask", "-d", "cloudtask"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cloudtask", "-d", "cloudtask"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cloudtask-db
  namespace: cloudtask
spec:
  selector:
    app: cloudtask-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  type: ClusterIP
