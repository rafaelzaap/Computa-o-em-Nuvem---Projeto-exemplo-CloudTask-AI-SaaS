# =============================================================================
# docker-compose.yml — CloudTask AI SaaS (Aula 2)
# -----------------------------------------------------------------------------
# Sobe a API FastAPI em container, usando o target `dev` do Dockerfile.
# Esta configuração é o "estado padrão" do desenvolvimento, consumido tanto
# por `docker compose up` quanto pelo devcontainer do VS Code.
#
# Comandos básicos:
#   docker compose up --build         # constrói e sobe
#   docker compose up -d              # em background
#   docker compose logs -f api        # acompanha os logs
#   docker compose exec api sh        # shell dentro do container
#   docker compose down               # para e remove containers
#
# Em produção (simulação local):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Evolução nas próximas aulas:
#   * Aula 3 (PostgreSQL): adicionaremos o serviço `db` (Postgres 16,
#     compatível com Amazon RDS for PostgreSQL) e `depends_on` no `api`.
#   * Aula 4 (.env): substituiremos os defaults inline por env_file: .env.
# =============================================================================

services:

  # ----- API FastAPI -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev                         # imagem com debugpy, ruff, watchfiles
    image: cloudtask-api:dev
    container_name: cloudtask-api
    ports:
      - "${APP_PORT:-8000}:8000"          # API
      - "5678:5678"                       # debugpy (attach do VS Code)
    volumes:
      # Mount cached: editar no host reflete dentro do container (hot-reload
      # do uvicorn ativa). Sintaxe `cached` melhora performance no macOS.
      - .:/app:cached
      # Cache do pip do usuário appuser. Sobrevive a `down`.
      - api-pip-cache:/home/appuser/.cache/pip
      # Credenciais temporárias do AWS Academy, somente para leitura.
      - ${USERPROFILE}/.aws:/home/appuser/.aws:ro
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: "${APP_PORT:-8000}"
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://cloudtask:cloudtask@db:5432/cloudtask}
      SECRET_KEY: ${SECRET_KEY:-change-me-please}
      STORAGE_MODE: ${STORAGE_MODE:-local}
      LOCAL_UPLOADS_DIR: ${LOCAL_UPLOADS_DIR:-local_uploads}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_PRESIGNED_URL_EXPIRES: ${S3_PRESIGNED_URL_EXPIRES:-3600}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,0.0.0.0,*}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    # Mantém container vivo mesmo após Ctrl+C do uvicorn — facilita o uso
    # como devcontainer, onde o VS Code dispara o uvicorn manualmente.
    restart: unless-stopped

  # ----- PostgreSQL -------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: cloudtask-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudtask}
      POSTGRES_DB: ${POSTGRES_DB:-cloudtask}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudtask -d cloudtask"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  api-pip-cache:
  pgdata:
